<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel ADM - Chá da Beatriz</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', sans-serif;
  background: #fff3f8;
  color: #5d3046;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 25px 15px 60px;
}

.card {
  background: white;
  border-radius: 25px;
  padding: 25px;
  margin-bottom: 20px;
  box-shadow: 0 12px 30px rgba(190,80,120,0.15);
  border: 1px solid #ffd2e2;
}

h1 {
  color: #b63d74;
  text-align: center;
  margin-bottom: 10px;
}

.sub {
  text-align: center;
  margin-bottom: 25px;
}

.resumo {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 15px;
}

.box {
  background: #fff6fa;
  border-radius: 20px;
  padding: 20px;
  text-align: center;
  border: 1px solid #f6bfd6;
}

.box strong {
  display: block;
  font-size: 30px;
  color: #d94f8c;
}

.filtros {
  text-align: center;
  margin-bottom: 15px;
}

button {
  border: none;
  padding: 12px 20px;
  border-radius: 40px;
  background: #d94f8c;
  color: white;
  font-weight: bold;
  cursor: pointer;
  margin: 5px;
}

button:hover {
  opacity: 0.9;
}

.tabela-container {
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 750px;
}

th, td {
  padding: 12px;
  border-bottom: 1px solid #f2c4d8;
  text-align: left;
}

th {
  background: #ffe1ec;
  color: #9f345f;
}

.status-sim {
  color: green;
  font-weight: bold;
}

.status-nao {
  color: red;
  font-weight: bold;
}

@media(max-width: 600px) {
  table {
    font-size: 13px;
  }
}
</style>
</head>

<body>

<div class="container">

  <div id="painel">

    <div class="card">
      <h1>📋 Confirmações da Beatriz</h1>
      <p class="sub">Acompanhe quem confirmou presença e quem não poderá ir.</p>
    </div>

    <div class="card resumo">
      <div class="box">
        <strong id="total">0</strong>
        Total de respostas
      </div>

      <div class="box">
        <strong id="sim">0</strong>
        Confirmaram
      </div>

      <div class="box">
        <strong id="nao">0</strong>
        Não poderão ir
      </div>

      <div class="box">
        <strong id="fraldas">0</strong>
        Presentes informados
      </div>
    </div>

    <div class="card">
      <div class="filtros">
        <button onclick="filtrar('Todos')">Todos</button>
        <button onclick="filtrar('Sim')">Confirmados</button>
        <button onclick="filtrar('Não')">Não irão</button>
        <button onclick="exportarCSV()">Exportar CSV</button>
      </div>

      <div class="tabela-container">
        <table>
          <thead>
            <tr>
              <th>Nome</th>
              <th>Presença</th>
              <th>Presente/Fralda</th>
              <th>Observação</th>
              <th>Data</th>
              <th>Ação</th>
            </tr>
          </thead>
          <tbody id="tabela"></tbody>
        </table>
      </div>
    </div>

  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  onSnapshot,
  query,
  orderBy,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBp_LfA5_KsB0pzb9E9Gf6p_dmjXEj-K-8",
  authDomain: "confirmacaochadefralda.firebaseapp.com",
  projectId: "confirmacaochadefralda",
  storageBucket: "confirmacaochadefralda.firebasestorage.app",
  messagingSenderId: "309498573276",
  appId: "1:309498573276:web:31d64479d864344364df19"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let dados = [];
let filtroAtual = "Todos";

function carregarDados() {
  const q = query(collection(db, "confirmacoes"), orderBy("criadoEm", "desc"));

  onSnapshot(q, (snapshot) => {
    dados = [];

    snapshot.forEach((docSnap) => {
      dados.push({
        id: docSnap.id,
        ...docSnap.data()
      });
    });

    atualizarResumo();
    renderizarTabela();
  });
}

function atualizarResumo() {
  const total = dados.length;
  const sim = dados.filter(item => item.presenca === "Sim").length;
  const nao = dados.filter(item => item.presenca === "Não").length;
  const fraldas = dados.filter(item => item.fralda && item.fralda !== "Não informado").length;

  document.getElementById("total").innerText = total;
  document.getElementById("sim").innerText = sim;
  document.getElementById("nao").innerText = nao;
  document.getElementById("fraldas").innerText = fraldas;
}

function formatarData(timestamp) {
  if (!timestamp) return "-";

  const data = timestamp.toDate();

  return data.toLocaleString("pt-BR", {
    day: "2-digit",
    month: "2-digit",
    year: "numeric",
    hour: "2-digit",
    minute: "2-digit"
  });
}

function renderizarTabela() {
  const tabela = document.getElementById("tabela");
  tabela.innerHTML = "";

  let lista = dados;

  if (filtroAtual !== "Todos") {
    lista = dados.filter(item => item.presenca === filtroAtual);
  }

  if (lista.length === 0) {
    tabela.innerHTML = `
      <tr>
        <td colspan="6">Nenhuma confirmação encontrada.</td>
      </tr>
    `;
    return;
  }

  lista.forEach(item => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${item.nome || "-"}</td>
      <td class="${item.presenca === "Sim" ? "status-sim" : "status-nao"}">${item.presenca || "-"}</td>
      <td>${item.fralda || "-"}</td>
      <td>${item.observacao || "-"}</td>
      <td>${formatarData(item.criadoEm)}</td>
      <td>
        <button onclick="excluirConfirmacao('${item.id}')">Excluir</button>
      </td>
    `;

    tabela.appendChild(tr);
  });
}

window.filtrar = function(tipo) {
  filtroAtual = tipo;
  renderizarTabela();
};

window.excluirConfirmacao = async function(id) {
  const confirmar = confirm("Deseja excluir essa confirmação?");

  if (!confirmar) return;

  await deleteDoc(doc(db, "confirmacoes", id));
};

window.exportarCSV = function() {
  let csv = "Nome;Presença;Presente/Fralda;Observação;Data\n";

  dados.forEach(item => {
    csv += `"${item.nome || ""}";"${item.presenca || ""}";"${item.fralda || ""}";"${item.observacao || ""}";"${formatarData(item.criadoEm)}"\n`;
  });

  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "confirmacoes-cha-beatriz.csv";
  a.click();
};

carregarDados();
</script>

</body>
</html>
